name: Build ARM64 Offline Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "*.cpp"
      - "*.h"
      - "CMakeLists.txt"
      - "deploy/**"
      - "config/**"
      - "tests/**"
      - "www/**"
      - ".github/workflows/build-arm64-offline.yml"

permissions:
  contents: read

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Build and test on Debian 11 ARM64
        shell: bash
        run: |
          set -euxo pipefail
          uname -m
          test "$(uname -m)" = "aarch64"

          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            debian:bullseye \
            bash -lc '
              set -eux
              test "$(uname -m)" = "aarch64"

              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                cmake \
                libmosquitto-dev

              rm -rf out/build/arm64-release
              cmake -S . -B out/build/arm64-release \
                -DCMAKE_BUILD_TYPE=Release \
                -DMDVWB_REQUIRE_MOSQUITTO=ON \
                -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
              cmake --build out/build/arm64-release --parallel 2
              (cd out/build/arm64-release && ctest --output-on-failure)
              ./out/build/arm64-release/MDVWB --version
              ./out/build/arm64-release/MDVWB --self-test
              ./out/build/arm64-release/mdvwb-manager validate config/buses.example.json
            '

      - name: Create offline installation archive
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf dist
          mkdir -p dist/MDVWB-arm64

          install -m 0755 out/build/arm64-release/MDVWB dist/MDVWB-arm64/MDVWB
          install -m 0755 out/build/arm64-release/mdvwb-manager dist/MDVWB-arm64/mdvwb-manager
          install -m 0755 deploy/mdvwb-run dist/MDVWB-arm64/mdvwb-run
          install -m 0755 deploy/offline-install.sh dist/MDVWB-arm64/offline-install.sh
          install -m 0644 deploy/mdvwb@.service dist/MDVWB-arm64/mdvwb@.service
          install -m 0640 deploy/mdvwb.env dist/MDVWB-arm64/mdvwb.env
          install -m 0644 deploy/mdvwb-manager.service dist/MDVWB-arm64/mdvwb-manager.service
          install -m 0640 deploy/mdvwb-manager.env dist/MDVWB-arm64/mdvwb-manager.env
          install -m 0640 deploy/buses.example.json dist/MDVWB-arm64/buses.example.json
          mkdir -p dist/MDVWB-arm64/www/mdvwb
          cp -a www/mdvwb/. dist/MDVWB-arm64/www/mdvwb/

          file dist/MDVWB-arm64/MDVWB
          readelf -h dist/MDVWB-arm64/MDVWB | grep -E "Class:|Machine:"

          (
            cd dist/MDVWB-arm64
            find MDVWB mdvwb-manager mdvwb-run mdvwb@.service mdvwb.env \
              mdvwb-manager.service mdvwb-manager.env buses.example.json \
              offline-install.sh www/mdvwb -type f -print0 | sort -z | \
              xargs -0 sha256sum > SHA256SUMS
          )

          tar -C dist -czf dist/MDVWB-arm64-offline.tar.gz MDVWB-arm64
          sha256sum dist/MDVWB-arm64-offline.tar.gz > dist/MDVWB-arm64-offline.tar.gz.sha256

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: MDVWB-arm64-offline
          path: |
            dist/MDVWB-arm64-offline.tar.gz
            dist/MDVWB-arm64-offline.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30
